<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Student Registration Form </h1>
<br/>
<br/>
<form>
    <label> First Name: </label>
    <input name="firstName" type="text" placeholder="Enter your First name" required />
    <br />
    <br />
    <label> Last Name: </label>
    <input name="lastName" type="text" placeholder="Enter your Last name" required />
    <br />
    <br />
    <label> Email: </label>
    <input name="email" type="email" placeholder="Enter your Email" required />
    <br />
    <br />
    <label>Date of Birth: </label>
    <input name="Date of birth" type="date"/>
    <br />
    <br />
    <label>Set Username:</label>
    <input name="Set Username" type="Text" placeholder="Set Username" required   />
    <br />
    <br />
    <label>Set Password</label>
    <input name="Set Password" type="password" placeholder="Set Password" required />
    <br />
    <br />  
    Gender:
    <br/>
    <input type="radio" name="gender" />Male
    <br/>
    <input type="radio" name="gender" />Female
    <br/>
    <input type="radio" name="gender" />Other
    <br />  
    <br />
    <label>Course:</label>
    <br />
    <input type="checkbox" name="course1" />BIT
    <br />
    <input type="checkbox" name="course2" />BBA
    <br />
    <input type="checkbox" name="course3" />B.Com
    <br />
    <input type="checkbox" name="course4" />B.Sc
    <br />
    <br/>
    <input type="submit" value="Register" />

</form>


    
</body>
</html>
